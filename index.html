<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TonPlay Monetized Hub</title>
    <!-- Tailwind CSS (for styled custom elements) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090d16',
                        cardBg: '#131926',
                        accentPurp: '#7c3aed',
                        accentGold: '#f59e0b',
                    }
                }
            }
        }
    </script>
    <!-- React and Babel for runtime processing -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Adsgram SDK Integration -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #090d16;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="select-none">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Custom Hook to manage Adsgram seamlessly
        function useAdsgram({ blockId, onReward, onError }) {
            const AdControllerRef = useRef(null);

            useEffect(() => {
                if (window.Adsgram) {
                    AdControllerRef.current = window.Adsgram.init({ blockId, debug: true }); // Enable debug for safe verification testing
                }
            }, [blockId]);

            return useCallback(async () => {
                if (AdControllerRef.current) {
                    try {
                        await AdControllerRef.current.show(); // Trigger Video rendering
                        onReward(); // Callback executed successfully
                    } catch (result) {
                        onError?.(result); // Trigger warning notifications if closed earlier
                    }
                } else {
                    // Fallback visual mock if adsgram SDK is running on generic testing/non-tg engines
                    console.warn("Adsgram is running on generic engine. Simulating Ad Completion...");
                    onError?.({ error: true, description: "Adsgram SDK not initialised. Simulating testing ad." });
                }
            }, [onReward, onError]);
        }

        function App() {
            // State
            const [activeTab, setActiveTab] = useState('home');
            const [user, setUser] = useState({
                telegram_id: '000000',
                username: 'TMA_Gamer',
                balance: 1250,
                streak: 2,
                last_daily_claim: null
            });
            const [transactions, setTransactions] = useState([]);
            const [toast, setToast] = useState({ visible: false, message: '', type: 'info' });
            const [adModal, setAdModal] = useState({ visible: false, resolve: null, reject: null });
            
            // Backend Settings
            const BACKEND_URL = "http://localhost:5000"; // Point this to your hosted instance URL during deployment
            const useLiveBackend = false; // Toggle to true to dynamically connect to the live Express instance
            const ADS_BLOCK_ID = "34821"; // Updated block ID

            // Initialization
            useEffect(() => {
                if (window.Telegram && window.Telegram.WebApp) {
                    const tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    tg.setHeaderColor('#090d16');
                    tg.setBackgroundColor('#090d16');

                    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                        const tgUser = tg.initDataUnsafe.user;
                        setUser(prev => ({
                            ...prev,
                            telegram_id: tgUser.id.toString(),
                            username: tgUser.username || `${tgUser.first_name} ${tgUser.last_name || ''}`.trim()
                        }));
                    }
                }
                loadInitialData();
            }, []);

            const loadInitialData = async () => {
                if (useLiveBackend) {
                    try {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/profile`, {
                            headers: { 'Authorization': `tma ${initData}` }
                        });
                        const data = await res.json();
                        if (data.telegram_id) setUser(data);
                        
                        const txRes = await fetch(`${BACKEND_URL}/api/transactions`, {
                            headers: { 'Authorization': `tma ${initData}` }
                        });
                        const txData = await txRes.json();
                        setTransactions(txData);
                    } catch (e) {
                        showToast("Failed to fetch cloud account details.", "error");
                    }
                } else {
                    // Load fallback storage mockup
                    const cached = localStorage.getItem('local_tma_profile');
                    if (cached) {
                        setUser(JSON.parse(cached));
                    }
                    const cachedTx = localStorage.getItem('local_tma_tx');
                    if (cachedTx) {
                        setTransactions(JSON.parse(cachedTx));
                    } else {
                        const sampleTxs = [
                            { id: 1, type: 'daily_streak', amount: 150, details: "Claimed Day 1 Reward", created_at: new Date().toISOString(), status: "approved" },
                            { id: 2, type: 'ad_reward', amount: 250, details: "Earning Ad Reward", created_at: new Date().toISOString(), status: "approved" }
                        ];
                        setTransactions(sampleTxs);
                    }
                }
            };

            const saveProfileData = (updatedUser) => {
                setUser(updatedUser);
                if (!useLiveBackend) {
                    localStorage.setItem('local_tma_profile', JSON.stringify(updatedUser));
                }
            };

            const addTransaction = (type, amount, details, status = "approved") => {
                const newTx = {
                    id: Date.now(),
                    type,
                    amount,
                    details,
                    created_at: new Date().toISOString(),
                    status
                };
                const updatedTxs = [newTx, ...transactions];
                setTransactions(updatedTxs);
                if (!useLiveBackend) {
                    localStorage.setItem('local_tma_tx', JSON.stringify(updatedTxs));
                }
            };

            // Custom Notification Toast trigger
            const showToast = (message, type = 'info') => {
                setToast({ visible: true, message, type });
                setTimeout(() => {
                    setToast(prev => ({ ...prev, visible: false }));
                }, 3000);
            };

            // Unified Adsgram SDK Caller with fallback visual simulator
            const playAdsgramVideo = () => {
                return new Promise((resolve, reject) => {
                    if (window.Adsgram) {
                        const controller = window.Adsgram.init({ blockId: ADS_BLOCK_ID });
                        controller.show()
                            .then(() => resolve(true)) // Completed viewing
                            .catch((err) => {
                                console.error("Adsgram failed to render:", err);
                                reject(err);
                            });
                    } else {
                        // Activate dynamic fullscreen UI Simulation for developers running in generic browsers
                        setAdModal({
                            visible: true,
                            resolve: () => {
                                setAdModal({ visible: false, resolve: null, reject: null });
                                resolve(true);
                            },
                            reject: (err) => {
                                setAdModal({ visible: false, resolve: null, reject: null });
                                reject(err);
                            }
                        });
                    }
                });
            };

            // 1. HOME SCREEN BUSINESS LOGIC
            const handleWatchAdClaim = async () => {
                try {
                    showToast("Loading Adsgram video...", "info");
                    await playAdsgramVideo();
                    
                    if (useLiveBackend) {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/reward/claim`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `tma ${initData}`
                            },
                            body: JSON.stringify({ actionType: 'home_ad' })
                        });
                        const data = await res.json();
                        if (data.success) {
                            setUser(prev => ({ ...prev, balance: data.balance }));
                            addTransaction('ad_reward', 250, "Watch Ads & Earn Rewards");
                            showToast("Received +250 points securely!", "success");
                        }
                    } else {
                        const newBal = user.balance + 250;
                        saveProfileData({ ...user, balance: newBal });
                        addTransaction('ad_reward', 250, "Watch Ads & Earn Rewards");
                        showToast("Simulated Ad reward claimed: +250 points!", "success");
                    }
                } catch (e) {
                    showToast("No ads loaded or user closed early", "error");
                }
            };

            const handleDailyClaim = async () => {
                const today = new Date().toISOString().split('T')[0];
                if (user.last_daily_claim === today) {
                    showToast("Daily claim already fulfilled today!", "error");
                    return;
                }

                try {
                    showToast("Verify via ad before claiming...", "info");
                    await playAdsgramVideo();

                    if (useLiveBackend) {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/reward/daily`, {
                            method: 'POST',
                            headers: { 'Authorization': `tma ${initData}` }
                        });
                        const data = await res.json();
                        if (data.success) {
                            setUser(prev => ({ ...prev, balance: data.balance, streak: data.streak, last_daily_claim: today }));
                            addTransaction('daily_streak', data.reward, `Daily Check-In Day ${data.streak}`);
                            showToast(`Day ${data.streak} bonus of +${data.reward} claimed!`, "success");
                        }
                    } else {
                        const nextStreak = (user.streak % 7) + 1;
                        const addedPoints = nextStreak * 100;
                        const updatedUser = {
                            ...user,
                            streak: nextStreak,
                            balance: user.balance + addedPoints,
                            last_daily_claim: today
                        };
                        saveProfileData(updatedUser);
                        addTransaction('daily_streak', addedPoints, `Daily Check-In Day ${nextStreak}`);
                        showToast(`Mock: Day ${nextStreak} claimed successfully! (+${addedPoints})`, "success");
                    }
                } catch (e) {
                    showToast("Verification failed. Try again.", "error");
                }
            };

            // 2. ACTIVE INTERACTIVE GAMES LOGIC
            const [activeGame, setActiveGame] = useState(null); // 'tap', 'spin', 'box'
            
            // Tap Game parameters
            const [tapScore, setTapScore] = useState(0);
            const [tapEnergy, setTapEnergy] = useState(100);
            const [clicks, setClicks] = useState([]);

            const handleTapperClick = (e) => {
                if (tapEnergy <= 0) {
                    showToast("Exhausted. Let energy recharge!", "error");
                    return;
                }
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                setTapScore(prev => prev + 1);
                setTapEnergy(prev => Math.max(0, prev - 2));
                setClicks(prev => [...prev, { id: Date.now(), x, y }]);
                
                // Remove tap floating effects from state
                setTimeout(() => {
                    setClicks(prev => prev.filter(c => Date.now() - c.id < 1000));
                }, 800);
            };

            const claimTapRewards = async () => {
                if (tapScore <= 0) return;
                try {
                    showToast("Verify ad view to secure rewards...", "info");
                    await playAdsgramVideo();

                    const pointsWon = Math.min(tapScore, 50); // Enforcing limits
                    if (useLiveBackend) {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/reward/claim`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `tma ${initData}`
                            },
                            body: JSON.stringify({ actionType: 'game_tap', score: pointsWon })
                        });
                        const data = await res.json();
                        if (data.success) {
                            setUser(prev => ({ ...prev, balance: data.balance }));
                            addTransaction('game_reward', pointsWon, `Tapper score payout`);
                            showToast(`Secured +${pointsWon} balance!`, "success");
                        }
                    } else {
                        const newBal = user.balance + pointsWon;
                        saveProfileData({ ...user, balance: newBal });
                        addTransaction('game_reward', pointsWon, `Tapper score payout`);
                        showToast(`Secured +${pointsWon} points!`, "success");
                    }
                    setTapScore(0);
                    setActiveGame(null);
                } catch (err) {
                    showToast("Failed to verify reward. Ad closed.", "error");
                }
            };

            // Wheel Game settings
            const [isSpinning, setIsSpinning] = useState(false);
            const [wheelRotation, setWheelRotation] = useState(0);
            const [spinResult, setSpinResult] = useState(null);

            const handleSpinTrigger = () => {
                if (isSpinning) return;
                setIsSpinning(true);
                setSpinResult(null);

                const degrees = Math.floor(Math.random() * 360) + 1440; // Spinning degrees
                setWheelRotation(prev => prev + degrees);

                setTimeout(() => {
                    setIsSpinning(false);
                    const rewards = [100, 50, 500, 0, 1000, 250];
                    const chosenIndex = Math.floor(((wheelRotation + degrees) % 360) / 60);
                    setSpinResult(rewards[chosenIndex]);
                }, 4000);
            };

            const claimSpinRewards = async () => {
                if (spinResult === null) return;
                try {
                    showToast("Processing verifying ad...", "info");
                    await playAdsgramVideo();

                    if (useLiveBackend) {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/reward/claim`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `tma ${initData}`
                            },
                            body: JSON.stringify({ actionType: 'game_spin', score: spinResult })
                        });
                        const data = await res.json();
                        if (data.success) {
                            setUser(prev => ({ ...prev, balance: data.balance }));
                            addTransaction('game_reward', spinResult, `Wheel claim payout`);
                            showToast(`Received +${spinResult} coins!`, "success");
                        }
                    } else {
                        const newBal = user.balance + spinResult;
                        saveProfileData({ ...user, balance: newBal });
                        addTransaction('game_reward', spinResult, `Wheel claim payout`);
                        showToast(`Mock: Spin reward of +${spinResult} secured!`, "success");
                    }
                    setSpinResult(null);
                    setActiveGame(null);
                } catch (e) {
                    showToast("No claim rewards awarded: Ad bypassed", "error");
                }
            };

            // Lucky Box details
            const [openedBox, setOpenedBox] = useState(null);
            const [boxPayout, setBoxPayout] = useState(0);

            const handleOpenBox = (boxId) => {
                if (openedBox !== null) return;
                const prizes = [150, 300, 500];
                const prize = prizes[Math.floor(Math.random() * prizes.length)];
                setOpenedBox(boxId);
                setBoxPayout(prize);
            };

            const claimBoxReward = async () => {
                if (!boxPayout) return;
                try {
                    showToast("Authenticating payout claim...", "info");
                    await playAdsgramVideo();

                    if (useLiveBackend) {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/reward/claim`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `tma ${initData}`
                            },
                            body: JSON.stringify({ actionType: 'game_box', score: boxPayout })
                        });
                        const data = await res.json();
                        if (data.success) {
                            setUser(prev => ({ ...prev, balance: data.balance }));
                            addTransaction('game_reward', boxPayout, `Lucky Box Claim`);
                            showToast(`Transferred +${boxPayout} points!`, "success");
                        }
                    } else {
                        const newBal = user.balance + boxPayout;
                        saveProfileData({ ...user, balance: newBal });
                        addTransaction('game_reward', boxPayout, `Lucky Box Claim`);
                        showToast(`Mock Box prize claimed: +${boxPayout} points!`, "success");
                    }
                    setOpenedBox(null);
                    setBoxPayout(0);
                    setActiveGame(null);
                } catch (e) {
                    showToast("Verify failed: Reward discarded", "error");
                }
            };


            // 3. TASK PAGE LOGIC
            const [taskCategory, setTaskCategory] = useState('social');
            const [tasksList, setTasksList] = useState([
                { id: 'tg_chan', title: 'Join Official Channel', reward: 500, category: 'social', description: 'Join our main announcement network for updates.', status: 'start' },
                { id: 'twit_fol', title: 'Follow Developer X', reward: 400, category: 'social', description: 'Follow updates on our main development feeds.', status: 'start' },
                { id: 'ad_mar', title: 'Complete 3 Video Viewings', reward: 300, category: 'daily', description: 'Trigger rewarded elements 3 times successfully.', status: 'start' },
                { id: 'fren_invite', title: 'Invite 3 Friends', reward: 1500, category: 'achievement', description: 'Use invite link to add users directly.', status: 'start' }
            ]);

            const handleTaskAction = (task) => {
                if (task.status === 'start') {
                    // Simulate task redirection action (e.g. Join Link)
                    showToast("Opening social link channels...", "info");
                    setTimeout(() => {
                        setTasksList(prev => prev.map(t => t.id === task.id ? { ...t, status: 'claim' } : t));
                    }, 2000);
                } else if (task.status === 'claim') {
                    triggerTaskClaimAd(task);
                }
            };

            const triggerTaskClaimAd = async (task) => {
                try {
                    showToast("Watch validation ad to receive task reward...", "info");
                    await playAdsgramVideo();

                    if (useLiveBackend) {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/tasks/complete`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `tma ${initData}`
                            },
                            body: JSON.stringify({ taskId: task.id, reward: task.reward })
                        });
                        const data = await res.json();
                        if (data.success) {
                            setUser(prev => ({ ...prev, balance: prev.balance + task.reward }));
                            addTransaction('task_completion', task.reward, `Completed task: ${task.title}`);
                            setTasksList(prev => prev.map(t => t.id === task.id ? { ...t, status: 'completed' } : t));
                            showToast(`Awarded +${task.reward} points!`, "success");
                        }
                    } else {
                        const newBal = user.balance + task.reward;
                        saveProfileData({ ...user, balance: newBal });
                        addTransaction('task_completion', task.reward, `Completed task: ${task.title}`);
                        setTasksList(prev => prev.map(t => t.id === task.id ? { ...t, status: 'completed' } : t));
                        showToast(`Mock task payout claim +${task.reward} accepted!`, "success");
                    }
                } catch (e) {
                    showToast("Ad validation unsuccessful.", "error");
                }
            };

            // 4. WALLET WITHDRAWAL REQUEST LOGIC
            const [payoutMethod, setPayoutMethod] = useState('TON');
            const [walletAddress, setWalletAddress] = useState('');
            const [withdrawAmount, setWithdrawAmount] = useState('');

            const handleWithdrawSubmit = async (e) => {
                e.preventDefault();
                const amt = parseInt(withdrawAmount);
                if (!walletAddress) {
                    showToast("Wallet validation address required.", "error");
                    return;
                }
                if (!amt || amt < 5000) {
                    showToast("Minimum limit: 5000 points.", "error");
                    return;
                }
                if (user.balance < amt) {
                    showToast("Insufficient balance.", "error");
                    return;
                }

                try {
                    if (useLiveBackend) {
                        const initData = window.Telegram?.WebApp?.initData || '';
                        const res = await fetch(`${BACKEND_URL}/api/withdraw/request`, {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `tma ${initData}`
                            },
                            body: JSON.stringify({
                                username: user.username,
                                address: walletAddress,
                                method: payoutMethod,
                                amount: amt
                            })
                        });
                        const data = await res.json();
                        if (data.success) {
                            setUser(prev => ({ ...prev, balance: data.balance }));
                            addTransaction('withdrawal', -amt, `Payout sent to ${walletAddress}`, "pending");
                            showToast("Withdrawal request filed securely!", "success");
                        } else {
                            showToast(data.error || "Request failed", "error");
                        }
                    } else {
                        const newBal = user.balance - amt;
                        saveProfileData({ ...user, balance: newBal });
                        addTransaction('withdrawal', -amt, `Payout to ${walletAddress} (${payoutMethod})`, "pending");
                        showToast("Withdrawal registered! (Awaiting processing)", "success");
                    }
                    setWalletAddress('');
                    setWithdrawAmount('');
                } catch (err) {
                    showToast("Cloud connection loss.", "error");
                }
            };

            // Constant Recharge Loop inside Tap game engine
            useEffect(() => {
                const interval = setInterval(() => {
                    setTapEnergy(prev => Math.min(100, prev + 1));
                }, 1500);
                return () => clearInterval(interval);
            }, []);

            return (
                <div class="relative w-full max-w-md h-screen mx-auto flex flex-col justify-between bg-darkBg text-white overflow-hidden shadow-2xl">
                    
                    {/* Header Bar */}
                    <header class="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-800/60 bg-[#0c1220]">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-accentPurp to-indigo-500 flex items-center justify-center font-bold text-lg text-white shadow-lg">
                                {user.username.slice(0, 1).toUpperCase()}
                            </div>
                            <div>
                                <h1 class="text-sm font-semibold tracking-wide text-gray-200">@{user.username}</h1>
                                <p class="text-xs text-gray-500">ID: {user.telegram_id}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 bg-[#171f30] px-3 py-1.5 rounded-full border border-gray-800">
                            <span class="w-5 h-5 bg-accentGold rounded-full flex items-center justify-center text-darkBg font-extrabold text-xs">₮</span>
                            <span class="font-bold text-sm tracking-tight text-accentGold">{user.balance}</span>
                        </div>
                    </header>

                    {/* Main Scrolling Body Canvas */}
                    <main class="flex-1 overflow-y-auto px-5 py-4 hide-scrollbar">
                        
                        {/* 1. HOME SCREEN VIEW */}
                        {activeTab === 'home' && (
                            <div class="space-y-6 animate-fade-in">
                                
                                {/* High Fidelity Earning Panel */}
                                <div class="bg-gradient-to-b from-cardBg to-[#111622] rounded-3xl p-6 text-center border border-gray-800 shadow-xl relative overflow-hidden group">
                                    <div class="absolute -top-10 -right-10 w-24 h-24 bg-accentPurp/10 rounded-full blur-xl group-hover:scale-150 transition duration-500"></div>
                                    <p class="text-gray-400 text-xs uppercase tracking-widest font-semibold mb-2">Total Accumulated Points</p>
                                    <div class="flex justify-center items-center gap-3 mb-5">
                                        <div class="w-12 h-12 bg-accentGold/20 rounded-full flex items-center justify-center animate-bounce">
                                            <span class="text-2xl text-accentGold">₮</span>
                                        </div>
                                        <h2 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-gray-100 to-accentGold">{user.balance}</h2>
                                    </div>

                                    <button 
                                        onClick={handleWatchAdClaim}
                                        class="w-full bg-gradient-to-r from-accentPurp to-indigo-600 hover:from-accentPurp/90 hover:to-indigo-600/90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-accentPurp/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-play"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                                        Watch Ads & Earn Rewards (+250)
                                    </button>
                                </div>

                                {/* Daily Streak Claims System */}
                                <div class="bg-cardBg rounded-3xl p-5 border border-gray-800">
                                    <div class="flex justify-between items-center mb-4">
                                        <h3 class="text-sm font-bold tracking-wide uppercase text-gray-400">Streak System (Daily)</h3>
                                        <span class="text-xs text-accentGold font-bold">{user.streak} / 7 Days Active</span>
                                    </div>
                                    <div class="grid grid-cols-4 gap-2.5 mb-4">
                                        {[1, 2, 3, 4, 5, 6, 7].map((day) => {
                                            const isClaimed = day <= user.streak;

                    <div 
                        class={`absolute left-5 right-5 top-8 p-3.5 rounded-2xl shadow-xl border text-xs font-bold transition-all duration-300 transform z-50 flex items-center justify-between ${
                            toast.visible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-4 scale-95 pointer-events-none'
                        } ${
                            toast.type === 'error' ? 'bg-[#291419] border-red-500/30 text-red-400' :
                            toast.type === 'success' ? 'bg-[#142921] border-green-500/30 text-green-400' :
                            'bg-[#141b2c] border-accentPurp/30 text-gray-300'
                        }`}
                    >
                        <span>{toast.message}</span>
                        <button onClick={() => setToast(prev => ({ ...prev, visible: false }))} class="text-sm">×</button>
                    </div>

                    {/* Fallback Adsgram Simulation Modal overlay */}
                    {adModal.visible && (
                        <div class="absolute inset-0 bg-darkBg z-50 flex flex-col justify-between p-6 animate-fade-in">
                            <div class="flex justify-between items-center mt-4">
                                <span class="bg-[#121825] px-4 py-1.5 rounded-full text-[10px] font-bold text-accentGold border border-gray-800">
                                    Adsgram Verified Simulation Mode
                                </span>
                                <span class="text-xs text-gray-400">Ad Block ID: {ADS_BLOCK_ID}</span>
                            </div>
                            <div class="my-auto text-center space-y-6">
                                <div class="w-20 h-20 bg-accentPurp/10 rounded-full flex items-center justify-center mx-auto text-4xl animate-pulse">
                                    🎥
                                </div>
                                <div class="space-y-2">
                                    <h4 class="text-lg font-bold">Earn points instantly by completing video viewings!</h4>
                                    <p class="text-xs text-gray-400 max-w-xs mx-auto">This fallback simulates live Adsgram views. In production, this launches the real Adsgram overlay frame.</p>
                                </div>
                                <div class="flex items-center justify-center gap-1.5 text-accentGold text-sm font-bold">
                                    <span>Time Left: 5 seconds</span>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button 
                                    onClick={() => adModal.reject({ error: true, description: "Closed earlier" })}
                                    class="flex-1 bg-[#151b2c] border border-gray-800 hover:bg-gray-800 text-gray-300 font-bold py-3.5 rounded-2xl text-sm"
                                >
                                    Close Ad
                                </button>
                                <button 
                                    onClick={() => adModal.resolve()}
                                    class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3.5 rounded-2xl text-sm shadow-lg shadow-green-500/10"
                                >
                                    Complete Viewing
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
